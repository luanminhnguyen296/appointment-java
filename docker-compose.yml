version: "3.8"
name: appointment

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_appointment
    restart: always
    ports:
      - "3306:3306"

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appointment
      MYSQL_USER: luan
      MYSQL_PASSWORD: luanpassword

    volumes:
      - ./data/mysql:/var/lib/mysql

    command: --default-authentication-plugin=mysql_native_password
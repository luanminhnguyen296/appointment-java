
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Doctors</title>
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
</head>

<body class="container">

	<h2 class="mt-4">Doctor List</h2>
	<a href="/appointments/new" class="btn btn-primary mb-3">Đặt lịch
		khám</a>
	<a href="/appointments" class="btn btn-primary mb-3">Danh sách cuộc
		hẹn</a>

	<table class="table table-bordered">

		<tr>
			<th>Name</th>
			<th>Specialty</th>
			<th>Description</th>
			<th>Action</th>
		</tr>

		<tr th:each="d : ${doctors}">

			<td th:text="${d.name}"></td>
			<td th:text="${d.specialty}"></td>
			<td th:text="${d.description}"></td>

			<td><a th:href="@{/appointments/new}" class="btn btn-success">Đặt
					lịch</a></td>

		</tr>

	</table>

</body>
<footer>
<table>
  <tr>
    <th>MSSV: 24002311 - Võ Kim Phi</th>
  </tr>
  <tr>
    <th>MSSV: 24002300 - Nguyễn Minh Luân</th>
  </tr>
</table>

</footer>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content_part}, ~{::head_part}, ~{::script_part})}">
<head>
    <title>Chi tiết bệnh nhân | MediAdmin</title>
    <th:block th:fragment="head_part">
        <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    </th:block>
</head>
<body>
    <th:block th:fragment="content_part">
        <div class="max-w-5xl mx-auto">
            <nav class="flex mb-6 text-sm text-slate-500" aria-label="Breadcrumb">
                <ol class="inline-flex items-center space-x-1 md:space-x-3">
                    <li class="inline-flex items-center">
                        <a href="/patients" class="hover:text-brand-600 flex items-center">
                            <i class="ri-group-line mr-2"></i> Khách hàng
                        </a>
                    </li>
                    <li>
                        <div class="flex items-center">
                            <i class="ri-arrow-right-s-line text-slate-400 mx-2"></i>
                            <span class="font-medium text-slate-800">Chi tiết hồ sơ</span>
                        </div>
                    </li>
                </ol>
            </nav>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Sidebar: Profile Card -->
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden sticky top-8">
                        <div class="h-24 bg-brand-600"></div>
                        <div class="px-6 pb-8 -mt-12 text-center">
                            <div class="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-white border-4 border-white shadow-lg mb-4 text-3xl font-black text-brand-600 uppercase"
                                 th:text="${#strings.substring(patient.fullName, 0, 1)}">
                            </div>
                            <h2 class="text-xl font-bold text-slate-800" th:text="${patient.fullName}"></h2>
                            <p class="text-slate-500 text-sm mt-1" th:text="'Mã BN: #' + ${patient.id}"></p>
                            
                            <div class="flex justify-center mt-6 space-x-2">
                                <a th:href="@{/patients/edit/{id}(id=${patient.id})}" 
                                   class="flex-1 bg-brand-50 text-brand-600 px-4 py-2.5 rounded-xl font-bold hover:bg-brand-100 transition">
                                    <i class="ri-edit-line mr-1"></i> Sửa
                                </a>
                                <button onclick="deleteCurrentPatient()" 
                                        class="flex-1 bg-red-50 text-red-600 px-4 py-2.5 rounded-xl font-bold hover:bg-red-100 transition">
                                    <i class="ri-delete-bin-line mr-1"></i> Xóa
                                </button>
                            </div>
                        </div>
                        <div class="px-6 py-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between text-xs font-bold text-slate-400 uppercase tracking-widest">
                            <span>Ngày tạo hồ sơ</span>
                            <span class="text-slate-600" th:text="${#temporals.format(patient.createdAt, 'dd/MM/yyyy')}"></span>
                        </div>
                    </div>
                </div>

                <!-- Main Content: Information -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Thông tin cơ bản -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-6 border-b border-slate-100 flex items-center">
                            <i class="ri-user-search-line text-brand-600 text-xl mr-3"></i>
                            <h3 class="font-bold text-slate-800 uppercase tracking-wider text-sm">Thông tin cá nhân</h3>
                        </div>
                        <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-y-8 gap-x-12">
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Giới tính</p>
                                <div class="flex items-center font-medium text-slate-700">
                                    <span th:classappend="${patient.gender == 'Nam' ? 'bg-blue-50 text-blue-600' : (patient.gender == 'Nữ' ? 'bg-pink-50 text-pink-600' : 'bg-slate-50 text-slate-600')}"
                                          class="px-3 py-1 rounded-full text-xs font-bold"
                                          th:text="${patient.gender ?: 'Chưa cập nhật'}"></span>
                                </div>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Ngày sinh</p>
                                <div class="flex items-center font-medium text-slate-700">
                                    <i class="ri-calendar-line mr-2 text-slate-400"></i>
                                    <span th:text="${#temporals.format(patient.dateOfBirth, 'dd/MM/yyyy') ?: 'Chưa cập nhật'}"></span>
                                </div>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Số điện thoại</p>
                                <div class="flex items-center font-bold text-slate-800">
                                    <i class="ri-phone-fill mr-2 text-brand-500"></i>
                                    <span th:text="${patient.phone}"></span>
                                </div>
                            </div>
                            <div>
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Email</p>
                                <div class="flex items-center font-medium text-slate-700">
                                    <i class="ri-mail-line mr-2 text-slate-400"></i>
                                    <span th:text="${patient.email ?: 'Chưa cập nhật'}"></span>
                                </div>
                            </div>
                            <div class="md:col-span-2">
                                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Địa chỉ thường trú</p>
                                <div class="flex items-start font-medium text-slate-700">
                                    <i class="ri-map-pin-2-line mr-2 text-slate-400 mt-1"></i>
                                    <span th:text="${patient.address ?: 'Chưa cập nhật'}"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Lịch sử khám (Placeholder cho tính năng sau) -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden opacity-60">
                        <div class="p-6 border-b border-slate-100 flex items-center">
                            <i class="ri-history-line text-slate-400 text-xl mr-3"></i>
                            <h3 class="font-bold text-slate-400 uppercase tracking-wider text-sm">Lịch sử khám bệnh</h3>
                        </div>
                        <div class="p-12 text-center">
                            <div class="text-slate-300 mb-4">
                                <i class="ri-folder-info-line text-6xl"></i>
                            </div>
                            <p class="text-slate-400 text-sm italic">Hệ thống đang phát triển tính năng lịch sử khám...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Script Delete riêng cho trang chi tiết -->
        <script th:inline="javascript">
            function deleteCurrentPatient() {
                const patientId = /*[[${patient.id}]]*/ null;
                if (patientId && confirm('Bạn có chắc chắn muốn xóa bệnh nhân này? Toàn bộ dữ liệu liên quan sẽ bị mất.')) {
                    window.location.href = '/patients/delete/' + patientId;
                }
            }
        </script>
    </th:block>

    <th:block th:fragment="script_part">
    </th:block>
</body>
</html>

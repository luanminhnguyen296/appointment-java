<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content_part}, ~{::head_part}, ~{::script_part})}">
<head>
    <title>Hồ sơ bệnh nhân | MediAdmin</title>
    <th:block th:fragment="head_part">
        <style>
            .premium-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; padding: 2rem; }
            .badge-status { @apply px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider; }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="content_part">
        <div class="max-w-5xl mx-auto">
            <div class="mb-10 flex items-center justify-between">
                <div>
                    <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Chi Tiết Hồ Sơ</h1>
                    <div class="flex items-center text-slate-400 font-bold mt-1 uppercase text-[10px] tracking-widest">
                        <a href="/patients" class="hover:text-brand-600 transition">Bệnh nhân</a>
                        <i class="ri-arrow-right-s-line mx-2"></i>
                        <span class="text-slate-800" th:text="${patient.fullName}"></span>
                    </div>
                </div>
                <div class="flex space-x-3">
                    <a th:href="@{/patients/edit/{id}(id=${patient.id})}" class="bg-white border text-slate-700 px-6 py-3 rounded-xl hover:bg-slate-50 transition shadow-sm font-bold text-sm">
                        Sửa hồ sơ
                    </a>
                    <button onclick="deletePatient()" class="bg-rose-50 text-rose-600 px-6 py-3 rounded-xl hover:bg-rose-100 transition font-bold text-sm">
                        Xóa hồ sơ
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div class="premium-card text-center relative overflow-hidden">
                        <div class="absolute top-0 inset-x-0 h-2 bg-brand-600"></div>
                        <div class="inline-flex items-center justify-center w-24 h-24 rounded-2xl bg-brand-50 text-brand-600 text-4xl font-black mb-4 uppercase mt-2" 
                             th:text="${#strings.substring(patient.fullName, 0, 1)}"></div>
                        <h2 class="text-xl font-black text-slate-800" th:text="${patient.fullName}"></h2>
                        <p class="text-[10px] font-black text-brand-600 uppercase tracking-widest mt-1" th:text="'Mã BN: #' + ${patient.id}"></p>
                        
                        <div class="mt-8 pt-8 border-t border-slate-100 text-left space-y-4">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Giới tính</p>
                                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-wider" 
                                      th:classappend="${patient.gender == 'Nam' ? 'bg-blue-50 text-blue-600' : (patient.gender == 'Nữ' ? 'bg-pink-50 text-pink-600' : 'bg-slate-50 text-slate-600')}"
                                      th:text="${patient.gender ?: 'N/A'}"></span>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ngày tạo</p>
                                <div class="font-bold text-slate-800 text-sm" th:text="${#temporals.format(patient.createdAt, 'dd/MM/yyyy HH:mm')}"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2 space-y-8">
                    <div class="premium-card">
                        <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-8 flex items-center">
                            <i class="ri-profile-line mr-2 text-brand-600"></i> Thông tin liên hệ
                        </h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Số điện thoại</p>
                                <div class="font-extrabold text-slate-800 text-base" th:text="${patient.phone}"></div>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Email</p>
                                <div class="font-bold text-slate-800 text-base" th:text="${patient.email ?: 'Chưa cập nhật'}"></div>
                            </div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Ngày sinh</p>
                                <div class="font-bold text-slate-800 text-base" th:text="${#temporals.format(patient.dateOfBirth, 'dd/MM/yyyy') ?: 'Chưa cập nhật'}"></div>
                            </div>
                            <div class="md:col-span-2">
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Địa chỉ</p>
                                <div class="font-bold text-slate-800 text-base leading-relaxed" th:text="${patient.address ?: 'Chưa cập nhật'}"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </th:block>

    <th:block th:fragment="script_part">
        <script th:inline="javascript">
            function deletePatient() {
                var id = [[${patient.id}]];
                if(id && confirm('Xóa bệnh nhân này?')) {
                    window.location.href = '/patients/delete/' + id;
                }
            }
        </script>
    </th:block>
</body>
</html>

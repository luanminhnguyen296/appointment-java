<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content_part}, ~{::head_part}, ~{::script_part})}">
<head>
    <title>Quản lý bệnh nhân | MediAdmin</title>
    <th:block th:fragment="head_part">
        <link rel="stylesheet" href="https://cdn.datatables.net/1.13.7/css/jquery.dataTables.min.css">
        <style>
            .dataTables_wrapper .dataTables_filter { display: none; }
            table.dataTable thead th { 
                background: #f8fafc !important; 
                color: #64748b !important; 
                font-weight: 800 !important; 
                text-transform: uppercase !important; 
                font-size: 11px !important; 
                border-bottom: 1px solid #f1f5f9 !important;
                padding: 16px 24px !important;
            }
            .avatar-premium { 
                width: 42px; height: 42px; border-radius: 12px; 
                display: flex; align-items: center; justify-content: center;
                background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
                font-weight: 800; border: 1px solid #bae6fd;
            }
            .premium-card { background: white; border-radius: 2rem; border: 1px solid #e2e8f0; padding: 2rem; }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="content_part">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-800 tracking-tight">Hồ Sơ Bệnh Nhân</h1>
                <p class="text-slate-400 font-medium text-sm mt-1">Danh sách tất cả các bệnh nhân đã đăng ký.</p>
            </div>
            <div class="flex space-x-3 mt-4 md:mt-0">
                <button id="btnRefresh" class="bg-white border text-slate-600 px-5 py-3 rounded-xl shadow-sm text-sm font-bold">
                    Làm mới
                </button>
                <a href="/patients/new" class="bg-brand-600 text-white px-6 py-3 rounded-xl shadow-lg shadow-brand-500/20 font-extrabold text-sm">
                    Thêm bệnh nhân mới
                </a>
            </div>
        </div>

        <div class="premium-card mb-8">
            <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                <div class="md:col-span-6">
                    <input type="text" id="idKeyword" placeholder="Tìm kiếm tên, SĐT hoặc email..."
                           class="w-full pl-6 pr-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500 transition-all outline-none font-medium text-sm" autocomplete="off">
                </div>
                <div class="md:col-span-3">
                    <select id="idGender" class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500 outline-none font-bold text-sm">
                        <option value="">Tất cả giới tính</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table id="patientTable" class="w-full text-sm"></table>
        </div>
    </th:block>

    <th:block th:fragment="script_part">
        <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
        <script th:inline="none">
            $(document).ready(function() {
                const table = $('#patientTable').DataTable({
                    serverSide: true,
                    processing: true,
                    paging: true,
                    pageLength: 10,
                    lengthMenu: [ [ 10, 25, 50, 100 ], [ 10, 25, 50, 100 ] ],
                    order: [ [ 1, "asc" ] ],
                    dom: "<'row'<'col-sm-12'tr>>" +
                         "<'row p-6 border-t border-slate-100'<'col-sm-12 col-md-5'i><'col-sm-12 col-md-7 flex justify-end'p>>",
                    ajax: {
                        url: "/api/v1/patients/list-datatable",
                        data: function (d) {
                            d.keyword = $('#idKeyword').val();
                            d.gender = $('#idGender').val();
                        }
                    },
                    language: {
                        processing: 'Đang tải...',
                        info: 'Hiển thị <b>_START_</b> đến <b>_END_</b> / <b>_TOTAL_</b>',
                        paginate: { next: 'Sau', previous: 'Trước' }
                    },
                    columns: [
                        {
                            title: "STT",
                            data: null,
                            width: "50px",
                            render: function(data, type, row, meta) {
                                return meta.settings._iDisplayStart + meta.row + 1;
                            }
                        },
                        {
                            title: "Bệnh nhân",
                            data: "fullName",
                            render: function(data, type, row) {
                                var initials = (data && data.length > 0) ? data.charAt(0) : '?';
                                return '<div class="flex items-center">' +
                                       '<div class="avatar-premium mr-4 text-brand-600">' + initials + '</div>' +
                                       '<div>' +
                                       '<div class="font-extrabold text-slate-800 text-sm">' + data + '</div>' +
                                       '<div class="text-xs text-slate-400">ID: #' + row.id + '</div>' +
                                       '</div>' +
                                       '</div>';
                            }
                        },
                        {
                            title: "Liên hệ",
                            data: "phone",
                            render: function(data, type, row) {
                                return '<div>' +
                                       '<div class="font-medium">' + data + '</div>' +
                                       '<div class="text-xs text-slate-400">' + (row.email || 'N/A') + '</div>' +
                                       '</div>';
                            }
                        },
                        {
                            title: "Thao tác",
                            data: null,
                            className: "text-right",
                            render: function(data, type, row) {
                                return '<div class="flex justify-end space-x-2">' +
                                       '<a href="/patients/view/' + row.id + '" class="text-brand-600 font-bold px-2">Xem</a>' +
                                       '<a href="/patients/edit/' + row.id + '" class="text-emerald-600 font-bold px-2">Sửa</a>' +
                                       '</div>';
                            }
                        }
                    ]
                });

                $('#idKeyword').on('keyup', function() { table.draw(); });
                $('#idGender').on('change', function() { table.draw(); });
                $('#btnRefresh').on('click', function() {
                    $('#idKeyword').val('');
                    $('#idGender').val('');
                    table.draw();
                });
            });
        </script>
    </th:block>
</body>
</html>

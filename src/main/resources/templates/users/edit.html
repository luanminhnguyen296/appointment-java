<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content_part}, ~{::head_part}, ~{::script_part}, ~{::breadcrumb_part}, '/users')}">
<head>
    <title>Chỉnh sửa User | MediAdmin</title>
    <th:block th:fragment="head_part"></th:block>
</head>
<body>
    <th:block th:fragment="breadcrumb_part">
        <i class="ri-arrow-right-s-line text-xs"></i>
        <a href="/users" class="hover:text-brand-600 transition">Quản lý Users</a>
        <i class="ri-arrow-right-s-line text-xs"></i>
        <span class="text-slate-600">Chỉnh sửa User</span>
    </th:block>

    <th:block th:fragment="content_part">
        <div class="mb-8">
            <h1 class="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">Chỉnh sửa User</h1>
            <p class="text-slate-400 font-medium text-xs md:text-sm mt-1">Cập nhật thông tin và phân quyền tài khoản.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 max-w-2xl">
            <form th:action="@{/users/update/{id}(id=${user.id})}" th:object="${user}" method="post" class="space-y-6">
                <input type="hidden" th:field="*{id}">

                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2" for="username">
                        Username
                    </label>
                    <div class="relative">
                        <i class="ri-user-3-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="username" th:field="*{username}" required
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-brand-400 focus:ring-4 focus:ring-brand-500/10 outline-none font-semibold text-slate-800 transition"
                               placeholder="Nhập username...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2" for="password">
                        Mật khẩu <span class="font-medium normal-case text-slate-400">(để trống nếu không đổi)</span>
                    </label>
                    <div class="relative">
                        <i class="ri-lock-password-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" th:field="*{password}"
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-brand-400 focus:ring-4 focus:ring-brand-500/10 outline-none font-semibold text-slate-800 transition"
                               placeholder="Nhập mật khẩu mới...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2" for="role">
                        Vai trò
                    </label>
                    <div class="relative">
                        <i class="ri-shield-user-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <select id="role" th:field="*{role}"
                                class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-brand-400 focus:ring-4 focus:ring-brand-500/10 outline-none font-semibold text-slate-800 transition appearance-none">
                            <option value="ROLE_USER">User</option>
                            <option value="ROLE_ADMIN">Admin</option>
                            <option value="ROLE_DOCTOR">Doctor</option>
                        </select>
                        <i class="ri-arrow-down-s-line absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit"
                            class="bg-brand-600 text-white px-8 py-3 rounded-xl hover:bg-brand-700 transition shadow-lg font-extrabold text-sm flex items-center">
                        <i class="ri-save-line mr-2"></i> Cập nhật
                    </button>
                    <a href="/users"
                       class="px-8 py-3 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition font-extrabold text-sm flex items-center">
                        <i class="ri-close-line mr-2"></i> Hủy
                    </a>
                </div>
            </form>
        </div>
    </th:block>

    <th:block th:fragment="script_part"></th:block>
</body>
</html>

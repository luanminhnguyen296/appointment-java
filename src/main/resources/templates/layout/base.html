<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, extra_head, extra_scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:insert="${title} ?: _">MediAdmin</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script th:inline="none">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: [ 'Plus Jakarta Sans', 'Inter', 'sans-serif' ] 
                    },
                    colors: { 
                        brand: { 
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 
                            300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 
                            600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e',
                        } 
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .nav-item {
            display: flex; align-items: center; padding: 0.75rem 1rem;
            color: #94a3b8; border-radius: 0.75rem; margin: 0.25rem 0.75rem;
            transition: all 0.2s; font-weight: 500;
        }
        .nav-item i { font-size: 1.25rem; margin-right: 0.75rem; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #f8fafc; }
        .nav-item.active { background: #0284c7; color: white; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
    </style>
    <th:block th:insert="${extra_head} ?: ~{}"></th:block>
</head>
<body class="bg-slate-50 text-slate-900" x-data="{ sidebarOpen: true }">
    <!-- Sidebar -->
    <aside class="fixed inset-y-0 left-0 sidebar-gradient w-72 transform transition-all duration-300 z-40 shadow-2xl" 
           x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        <div class="px-8 py-8 flex items-center mb-4">
            <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg mr-3">
                <i class="ri-hospital-fill text-2xl"></i>
            </div>
            <div>
                <h1 class="text-white font-extrabold text-xl tracking-tight">MediHub</h1>
            </div>
        </div>

        <div class="px-6 mb-4">
            <nav class="space-y-1">
                <a href="/" class="nav-item">
                    <i class="ri-dashboard-2-line"></i><span>Tổng quan</span>
                </a>
                <a href="/patients" class="nav-item active">
                    <i class="ri-group-line"></i><span>Bệnh nhân</span>
                </a>
                <a href="/appointments" class="nav-item">
                    <i class="ri-calendar-check-line"></i><span>Lịch hẹn</span>
                </a>
            </nav>
        </div>
    </aside>

    <div class="transition-all duration-300" x-bind:class="sidebarOpen ? 'ml-72' : 'ml-0'">
        <header class="glass-header h-20 border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <div class="flex items-center space-x-6">
                <button x-on:click="sidebarOpen = !sidebarOpen" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400">
                    <i class="ri-menu-2-line text-lg"></i>
                </button>
                <h2 class="text-sm font-bold text-slate-800">Hệ thống Quản lý MediHub</h2>
            </div>
        </header>

        <main class="p-10 min-h-screen">
            <th:block th:insert="${content} ?: ~{}"></th:block>
        </main>

        <footer class="p-10 border-t border-slate-200 text-slate-400 text-xs font-medium flex justify-between items-center bg-white">
            <div>© 2024 <span class="font-bold text-brand-600">MediHub</span></div>
            <div class="flex space-x-6 font-black uppercase">
                <span>Võ Kim Phi - 24002311</span>
                <span>Nguyễn Minh Luân - 24002300</span>
            </div>
        </footer>
    </div>
    
    <th:block th:insert="${extra_scripts} ?: ~{}"></th:block>
</body>
</html>

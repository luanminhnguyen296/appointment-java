<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content_part, head_part, script_part, breadcrumb_part, back_url)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">MediAdmin</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
    <link rel="stylesheet" th:href="@{/css/choices-custom.css}"/>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    
    <script th:inline="none">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { 
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' } 
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-gradient { background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); }
        .nav-item {
            display: flex; align-items: center; padding: 0.75rem 1rem;
            color: #94a3b8; border-radius: 0.75rem; margin: 0.25rem 0.75rem;
            transition: all 0.2s; font-weight: 500;
        }
        .nav-item i { font-size: 1.25rem; margin-right: 0.75rem; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #f8fafc; }
        .nav-item.active { background: #0284c7; color: white; box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3); }
        .glass-header { background: rgba(255, 255, 255, 0.82); backdrop-filter: blur(10px); }
    </style>
    <th:block th:replace="${head_part} ?: ~{}"></th:block>
</head>
<body class="bg-slate-50 text-slate-900" x-data="{ sidebarOpen: true }">
    <aside class="fixed inset-y-0 left-0 sidebar-gradient w-72 transform transition-all duration-300 z-40 shadow-2xl" 
           x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        <div class="px-8 py-8 flex items-center mb-4">
            <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center text-white shadow-lg mr-3">
                <i class="ri-hospital-fill text-2xl"></i>
            </div>
            <h1 class="text-white font-extrabold text-xl tracking-tight">MediHub</h1>
        </div>

        <div class="px-6">
            <nav class="space-y-1">
                <a href="/" class="nav-item">
                    <i class="ri-information-line"></i><span>Giới thiệu</span>
                </a>
                <a href="/patients" class="nav-item">
                    <i class="ri-group-line"></i><span>Bệnh nhân</span>
                </a>
                <a href="/doctors" class="nav-item">
                    <i class="ri-nurse-line"></i><span>Bác sĩ</span>
                </a>

                <a href="/hospitals" class="nav-item">
                    <i class="ri-hospital-line"></i><span>Bệnh viện</span>
                </a>
                <a href="/specialties" class="nav-item">
                    <i class="ri-heart-pulse-line"></i><span>Chuyên khoa</span>
                </a>
                <a href="/users" class="nav-item">
                    <i class="ri-shield-user-line"></i><span>Quản lý Users</span>
                </a>
            </nav>
        </div>

        <div class="absolute bottom-0 left-0 right-0 px-6 py-6 border-t border-white/10">
            <a href="/logout" class="nav-item text-red-400 hover:text-red-300 hover:bg-red-500/10">
                <i class="ri-logout-box-r-line"></i><span>Đăng xuất</span>
            </a>
        </div>
    </aside>

    <div class="transition-all duration-300" x-bind:class="sidebarOpen ? 'ml-72' : 'ml-0'">
        <header class="glass-header h-20 border-b border-slate-200 flex items-center justify-between px-10 sticky top-0 z-30">
            <div class="flex items-center space-x-6">
                <button x-on:click="sidebarOpen = !sidebarOpen" class="w-10 h-10 flex items-center justify-center rounded-xl border border-slate-200 text-slate-400">
                    <i class="ri-menu-2-line text-lg"></i>
                </button>
                <h2 class="text-sm font-bold text-slate-800">MediHub Pro</h2>
            </div>
        </header>

        <main class="p-10 min-h-screen">
            <!-- Breadcrumb & Back Button -->
            <div th:if="${breadcrumb_part}" class="flex items-center mb-6">
                <!-- Back Button -->
                <a th:if="${back_url}" th:href="${back_url}" 
                   class="mr-4 w-10 h-10 flex items-center justify-center rounded-xl bg-white border border-slate-200 text-slate-400 hover:text-brand-600 hover:border-brand-200 hover:bg-brand-50 transition shadow-sm group">
                    <i class="ri-arrow-left-line text-lg group-hover:-translate-x-1 transition-transform"></i>
                </a>

                <nav class="flex items-center space-x-2 text-slate-400 text-[11px] font-bold uppercase tracking-widest">
                    <a href="/" class="hover:text-brand-600 transition flex items-center">
                        <i class="ri-home-4-line mr-1 text-sm"></i> Trang chủ
                    </a>
                    <th:block th:replace="${breadcrumb_part}"></th:block>
                </nav>
            </div>

            <th:block th:replace="${content_part} ?: ~{}"></th:block>
        </main>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            const navItems = document.querySelectorAll('.nav-item');
            
            navItems.forEach(item => {
                const href = item.getAttribute('href');
                if (currentPath === href || (href !== '/' && currentPath.startsWith(href))) {
                    item.classList.add('active');
                }
            });
        });
    </script>
    <th:block th:replace="${script_part} ?: ~{}"></th:block>
</body>
</html>

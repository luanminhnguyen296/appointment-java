<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content, extra_head, extra_scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">MediAdmin</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' } }
                }
            }
        }
    </script>
    <style>
        .sidebar { background-color: #0f172a; }
        .sidebar-item { display: flex; align-items: center; padding: 0.75rem 1rem; color: #94a3b8; border-radius: 0.5rem; margin: 0.25rem 0.5rem; transition: all 0.2s; }
        .sidebar-item:hover { background-color: #1e293b; color: white; }
        .sidebar-item.active { background-color: #0284c7; color: white; }
    </style>
    <th:block th:replace="${extra_head} ?: ~{}"></th:block>
</head>
<body class="bg-gray-50" x-data="{ sidebarOpen: true }">
    <aside class="fixed inset-y-0 left-0 sidebar w-64 transform transition-transform z-30" x-bind:class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'">
        <div class="p-6 border-b border-slate-800 text-white font-bold text-xl text-center">MediAdmin</div>
        <nav class="mt-6">
            <a href="/" class="sidebar-item">Trang Chủ</a>
            <a href="/patients" class="sidebar-item active">Khách Hàng</a>
        </nav>
    </aside>

    <div class="transition-all" x-bind:class="sidebarOpen ? 'ml-64' : 'ml-0'">
        <header class="bg-white h-16 border-b flex items-center px-8 shadow-sm">
            <button x-on:click="sidebarOpen = !sidebarOpen" class="text-gray-500 hover:text-brand-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>
        </header>
        <main class="p-8">
            <th:block th:replace="${content} ?: ~{}"></th:block>
        </main>
    </div>
    <th:block th:replace="${extra_scripts} ?: ~{}"></th:block>
</body>
</html>

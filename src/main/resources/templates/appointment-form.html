
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Appointment Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container">

<h2 class="mt-4">Book Appointment</h2>

<form th:action="@{/appointments/save}" method="post" th:object="${appointment}">

<input type="hidden" th:field="*{id}"/>

<div class="mb-3">
<label>Doctor</label>
<select class="form-control" th:field="*{doctorId}">
<option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name}"></option>
</select>
</div>

<div class="mb-3">
<label>Patient Name</label>
<input class="form-control" th:field="*{patientName}">
</div>

<div class="mb-3">
<label>Age</label>
<input class="form-control" th:field="*{age}">
</div>

<div class="mb-3">
<label>Phone</label>
<input class="form-control" th:field="*{phone}">
</div>

<div class="mb-3">
<label>Date</label>
<input type="date" class="form-control" th:field="*{date}">
</div>

<div class="mb-3">
<label>Time</label>
<input type="time" class="form-control" th:field="*{time}">
</div>

<div class="mb-3">
<label>Note</label>
<textarea class="form-control" th:field="*{note}"></textarea>
</div>

<button class="btn btn-primary">Save</button>

</form>

</body>
</html>

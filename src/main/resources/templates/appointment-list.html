
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Appointments</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container">

<h2 class="mt-4">Appointment List</h2>

<a href="/appointments/new" class="btn btn-primary mb-3">New Appointment</a>
<a href="../" class="btn btn-primary mb-3">Home</a>
<table class="table table-bordered">

<tr>
<th>Doctor</th>
<th>Patient</th>
<th>Date</th>
<th>Time</th>
<th>Phone</th>
<th>Actions</th>
</tr>

<tr th:each="a : ${appointments}">

<td th:text="${a.doctorId}"></td>
<td th:text="${a.patientName}"></td>
<td th:text="${a.date}"></td>
<td th:text="${a.time}"></td>
<td th:text="${a.phone}"></td>

<td>

<a th:href="@{/appointments/view/{id}(id=${a.id})}" class="btn btn-info btn-sm">View</a>

<a th:href="@{/appointments/edit/{id}(id=${a.id})}" class="btn btn-warning btn-sm">Edit</a>

<a th:href="@{/appointments/delete/{id}(id=${a.id})}" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

</table>

</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::title}, ~{::content_part}, ~{::head_part}, ~{::script_part}, ~{::breadcrumb_part}, '/doctors')}">
<head>
    <title th:text="${doctor.id == null ? 'Bác Sĩ Mới' : 'Cập Nhật Bác Sĩ'} + ' | MediAdmin'"></title>
    <th:block th:fragment="head_part">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css"/>
        <style>
            .premium-card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; padding: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.02); }
            input:focus, select:focus, textarea:focus { border-color: #0284c7 !important; background: white !important; }
        </style>
    </th:block>
</head>
<body>
    <th:block th:fragment="breadcrumb_part">
        <i class="ri-arrow-right-s-line text-xs"></i>
        <a href="/doctors" class="hover:text-brand-600 transition">Bác sĩ</a>
        <i class="ri-arrow-right-s-line text-xs"></i>
        <span class="text-slate-600" th:text="${doctor.id == null ? 'Thêm mới' : 'Cập nhật'}"></span>
    </th:block>

    <th:block th:fragment="content_part">
        <div class="max-w-4xl mx-auto pb-20">
            <div class="mb-10">
                <h1 class="text-4xl font-black text-slate-800 tracking-tight" th:text="${doctor.id == null ? 'Thêm Bác Sĩ' : 'Sửa Thông Tin'}"></h1>
                <p class="text-slate-400 font-bold text-sm mt-2">Cập nhật đội ngũ chuyên gia y tế chất lượng cao.</p>
            </div>

            <div class="premium-card">
                <form th:action="@{/doctors/save}" th:object="${doctor}" method="POST" class="space-y-8">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Image URL Input -->
                        <div class="md:col-span-2 space-y-3">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Đường dẫn ảnh đại diện (URL)</label>
                            <div class="flex flex-col md:flex-row gap-6">
                                <div class="w-full md:w-48">
                                    <div class="aspect-square bg-slate-50 border-2 border-slate-100 rounded-3xl overflow-hidden flex items-center justify-center relative group">
                                        <img id="imagePreview" 
                                             th:src="${doctor.imageUrl != null ? doctor.imageUrl : ''}" 
                                             th:style="${doctor.imageUrl != null and !#strings.isEmpty(doctor.imageUrl) ? 'display: block' : 'display: none'}"
                                             class="w-full h-full object-cover">
                                        
                                        <div id="uploadPlaceholder" 
                                             th:style="${doctor.imageUrl != null and !#strings.isEmpty(doctor.imageUrl) ? 'display: none' : 'display: flex'}"
                                             class="flex-col items-center">
                                            <i class="ri-image-line text-4xl text-slate-200"></i>
                                            <span class="text-[10px] text-slate-400 font-bold mt-2">Chưa có ảnh</span>
                                        </div>
                                    </div>
                                </div>

                                <!-- Input Box -->
                                <div class="flex-1 flex flex-col justify-center space-y-4">
                                    <input type="text" th:field="*{imageUrl}" id="imageUrlInput" placeholder="https://example.com/doctor.jpg"
                                           class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                                    <p class="text-[9px] text-slate-400 font-medium italic">Dán URL ảnh để hiển thị ảnh đại diện bác sĩ.</p>
                                </div>
                            </div>
                        </div>

                        <!-- Name -->
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Họ và tên bác sĩ <span class="text-rose-500">*</span></label>
                            <input type="text" th:field="*{name}" required placeholder="VD: BS. Nguyễn Văn A"
                                   class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                        </div>

                        <!-- Specialty -->
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Chuyên khoa</label>
                            <select id="specialtySelect" class="w-full font-bold text-sm">
                                <option value="">Đang tải chuyên khoa...</option>
                            </select>
                        </div>

                        <!-- Rating -->
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Đánh giá (Số sao)</label>
                            <input type="number" step="0.1" min="0" max="5" th:field="*{rating}"
                                   class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                        </div>

                        <!-- Phone -->
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Số điện thoại</label>
                            <input type="tel" th:field="*{phone}"
                                   class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                        </div>

                        <!-- Email -->
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Email</label>
                            <input type="email" th:field="*{email}"
                                   class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                        </div>

                        <!-- Experience -->
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Kinh nghiệm chuyên môn</label>
                            <input type="text" th:field="*{experience}" placeholder="VD: 15 năm kinh nghiệm tại BV Bạch Mai"
                                   class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700">
                        </div>

                        <!-- Hospitals -->
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Cơ sở công tác</label>
                            <select id="hospitalsSelect" multiple class="w-full font-bold text-sm">
                                <!-- Options will be loaded via API -->
                            </select>
                        </div>

                        <!-- Description -->
                        <div class="md:col-span-2">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Mô tả giới thiệu</label>
                            <textarea th:field="*{description}" rows="4"
                                      class="w-full px-6 py-4 bg-slate-50 border border-transparent rounded-2xl focus:bg-white focus:ring-4 focus:ring-brand-500/10 focus:border-brand-300 outline-none font-bold text-sm transition-all text-slate-700"></textarea>
                        </div>
                    </div>

                    <div class="pt-10 flex justify-end space-x-4">
                        <a href="/doctors" class="px-8 py-4 text-slate-500 font-black text-sm hover:text-slate-800 transition-all">Hủy</a>
                        <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white px-10 py-4 rounded-2xl shadow-lg shadow-brand-200 transition-all font-black text-sm">
                            LƯU THÔNG TIN
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </th:block>

    <th:block th:fragment="script_part">
        <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <script th:inline="javascript">
            document.addEventListener('DOMContentLoaded', async function() {
                // Get current values from Thymeleaf
                const currentDoctorId = [[${doctor.id}]];
                const currentSpecialtyId = [[${doctor.specialty?.id}]];
                const currentHospitalIds = [[${doctor.hospitals != null ? doctor.hospitals.![id] : {}}]];

                // Image Preview
                const imageUrlInput = document.getElementById('imageUrlInput');
                const imagePreview = document.getElementById('imagePreview');
                const uploadPlaceholder = document.getElementById('uploadPlaceholder');

                function updateImagePreview(url) {
                    if (url) {
                        imagePreview.src = url;
                        imagePreview.style.display = 'block';
                        uploadPlaceholder.style.display = 'none';
                    } else {
                        imagePreview.src = '';
                        imagePreview.style.display = 'none';
                        uploadPlaceholder.style.display = 'flex';
                    }
                }

                if (imageUrlInput) {
                    imageUrlInput.addEventListener('input', function() {
                        updateImagePreview(this.value.trim());
                    });
                }

                // Initialize Choices
                const specialtyChoices = new Choices('#specialtySelect', { searchEnabled: true, itemSelectText: '' });
                const hospitalsChoices = new Choices('#hospitalsSelect', { removeItemButton: true, itemSelectText: '' });

                // Load Specialties via API
                try {
                    const response = await fetch('/api/v1/specialties/all');
                    const specialties = await response.json();
                    
                    const specOptions = specialties.map(s => ({
                        value: s.id,
                        label: s.name,
                        selected: s.id == currentSpecialtyId
                    }));
                    
                    specialtyChoices.clearChoices();
                    specialtyChoices.setChoices([
                        { value: '', label: 'Chọn chuyên khoa...', disabled: true, placeholder: true },
                        ...specOptions
                    ], 'value', 'label', true);
                } catch (error) {
                    console.error('Error loading specialties:', error);
                }

                // Load Hospitals via API
                try {
                    const response = await fetch('/api/v1/hospitals/all');
                    const hospitals = await response.json();
                    
                    const hospOptions = hospitals.map(h => ({
                        value: h.id,
                        label: h.name,
                        selected: currentHospitalIds.includes(h.id)
                    }));
                    
                    hospitalsChoices.setChoices(hospOptions, 'value', 'label', true);
                } catch (error) {
                    console.error('Error loading hospitals:', error);
                }

                // Handle Form AJAX Submission
                const form = document.querySelector('form');
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const formData = new FormData(form);
                    const data = {};
                    formData.forEach((value, key) => {
                        if (key === 'id' && value === '') {
                            data[key] = null;
                        } else if (key !== 'specialty' && key !== 'hospitals') {
                            data[key] = value;
                        }
                    });

                    // Manual handle for specialty (get from Choices)
                    const specId = specialtyChoices.getValue(true);
                    data.specialty = specId ? { id: specId } : null;

                    // Manual handle for hospitals (get from Choices)
                    const hospIds = hospitalsChoices.getValue(true);
                    data.hospitals = hospIds.map(id => ({ id: id }));

                    const isUpdate = currentDoctorId !== null;
                    const url = isUpdate ? `/doctors/update/${currentDoctorId}` : '/doctors/create';
                    const method = isUpdate ? 'PUT' : 'POST';

                    fetch(url, {
                        method: method,
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    })
                    .then(response => {
                        if (response.ok) {
                            Swal.fire({
                                icon: 'success',
                                title: 'Thành công!',
                                text: 'Thông tin bác sĩ đã được lưu.',
                                showConfirmButton: false,
                                timer: 1500
                            });
                            setTimeout(() => window.location.href = '/doctors', 500);
                        } else {
                            throw new Error('Lỗi khi lưu dữ liệu');
                        }
                    })
                    .catch(err => {
                        Swal.fire('Thất bại', err.message, 'error');
                    });
                });
            });
        </script>
    </th:block>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập | MediHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    <script th:inline="none">
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd', 300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1', 800: '#075985', 900: '#0c4a6e' }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #0c4a6e 100%); min-height: 100vh; }
        .glass-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .login-input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            transition: all 0.2s;
        }
        .login-input::placeholder { color: rgba(148,163,184,0.7); }
        .login-input:focus {
            outline: none;
            background: rgba(255,255,255,0.12);
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <!-- Background pattern -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-40 -right-40 w-96 h-96 bg-brand-500/10 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-40 -left-40 w-96 h-96 bg-brand-700/10 rounded-full blur-3xl"></div>
    </div>

    <div class="w-full max-w-md relative">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-brand-500 rounded-2xl shadow-2xl shadow-brand-500/40 mb-4">
                <i class="ri-hospital-fill text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">MediHub</h1>
            <p class="text-slate-400 text-sm font-medium mt-1">Hệ thống quản lý phòng khám</p>
        </div>

        <!-- Card -->
        <div class="glass-card rounded-3xl p-8">
            <h2 class="text-xl font-bold text-white mb-6">Đăng nhập</h2>

            <!-- Alerts -->
            <div th:if="${param.error}" class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-300 rounded-xl px-4 py-3 mb-5 text-sm font-medium">
                <i class="ri-error-warning-line text-lg shrink-0"></i>
                Tên đăng nhập hoặc mật khẩu không đúng.
            </div>
            <div th:if="${error}" class="flex items-center gap-3 bg-red-500/10 border border-red-500/20 text-red-300 rounded-xl px-4 py-3 mb-5 text-sm font-medium">
                <i class="ri-error-warning-line text-lg shrink-0"></i>
                <span th:text="${error}"></span>
            </div>
            <div th:if="${param.logout}" class="flex items-center gap-3 bg-green-500/10 border border-green-500/20 text-green-300 rounded-xl px-4 py-3 mb-5 text-sm font-medium">
                <i class="ri-checkbox-circle-line text-lg shrink-0"></i>
                Bạn đã đăng xuất thành công.
            </div>

            <form th:action="@{/login}" method="post" class="space-y-5">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">
                        Tên đăng nhập
                    </label>
                    <div class="relative">
                        <i class="ri-user-3-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" name="username" id="username" required autofocus
                               class="login-input w-full pl-11 pr-4 py-3.5 rounded-xl font-semibold text-sm"
                               placeholder="Nhập username...">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase tracking-widest mb-2">
                        Mật khẩu
                    </label>
                    <div class="relative">
                        <i class="ri-lock-password-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" name="password" id="password" required
                               class="login-input w-full pl-11 pr-4 py-3.5 rounded-xl font-semibold text-sm"
                               placeholder="Nhập mật khẩu...">
                    </div>
                </div>

                <button type="submit"
                        class="w-full bg-brand-600 hover:bg-brand-500 text-white font-extrabold py-4 rounded-xl transition shadow-xl shadow-brand-600/30 flex items-center justify-center gap-2 mt-2">
                    <i class="ri-login-box-line text-lg"></i>
                    Đăng nhập
                </button>
            </form>
        </div>

        <p class="text-center text-slate-500 text-xs font-medium mt-6">
            &copy; 2024 MediHub. All rights reserved.
        </p>
    </div>
</body>
</html>
